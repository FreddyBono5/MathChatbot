<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algebraic Math Tutor</title>


  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-container">


    <aside class="sidebar">
      <h2>Previous Problems</h2>
      <ul id="problem-list">

      </ul>
      <button id="clear-history">Clear History</button>
    </aside>

   
    <main class="chat-container">
      <header class="chat-header">
        <h1>Algebraic Math Tutor</h1>
        <p>Ask a math question or enter an equation</p>
      </header>

      <div class="chat-box" id="chat-box"></div>

      <form id="chat-form" class="chat-input">
        <input
          type="text"
          id="user-input"
          placeholder="Example: Solve x² + 6x + 5 = 0"
          required
        />
        <button type="submit">Send</button>
      </form>
    </main>

  </div>

  <script>
    const chatForm = document.getElementById("chat-form");
    const userInput = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    function addMessage(sender, text) {
      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message", sender);
      messageDiv.innerText = text;
      chatBox.appendChild(messageDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      return messageDiv;
    }

    // Loads previous problems and displays them on sidebar
    async function loadPreviousProblems() {
        const res = await fetch("/api/problems");
        const data = await res.json();
        const list = document.getElementById("problem-list");
        list.innerHTML = "";

        data.problems.forEach((p) => {
          const li = document.createElement("li");
          li.dataset.id = p._id;

          const span = document.createElement("span");
          span.innerText = p.question;
          li.appendChild(span);

          // Add a button with an "X" for deleting a previous problem
          const deleteButton = document.createElement("button");
          deleteButton.innerText = "X";
          deleteButton.addEventListener("click", async (e) => {
              e.stopPropagation(); // Ensures that the problem isn't loaded when the "X" is clicked
              const res = await fetch("/api/problem/" + p._id, { method: "DELETE" });
    
              if (res.ok) {
                  await loadPreviousProblems(); // Waits for for refresh to complete
                  chatBox.innerHTML = ""; // Removes everything inside the chat box as well when the history is cleared
              } else {
                  console.error("Delete failed:", await res.json());
              }
          });

          // Allows the problems on the sidebar to be clickable
          li.addEventListener("click", async () => {
            const id = li.dataset.id;
            const res = await fetch("/api/problem/" + id);
            const data = await res.json();

            addMessage("user", data.question);
            addMessage("bot", data.solution);
            chatBox.scrollTop = chatBox.scrollHeight;
          });

          li.appendChild(deleteButton);
          list.appendChild(li);
        });
    }


    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = userInput.value.trim();
      if (!message) return;

      addMessage("user", message);
      userInput.value = "";

     
      const loadingMsg = addMessage("bot", "Solving... please wait ⏳");

      try {
        const response = await fetch("/api/solve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ problem: message })
        });

        const data = await response.json();
        loadingMsg.innerText =
          data.solution || "Error solving problem.";

          loadPreviousProblems();

      } catch {
        loadingMsg.innerText = "Something went wrong.";
      }
    });

    // Allows the Clear History Button Function
    document.getElementById("clear-history").addEventListener("click", async () => {
        await fetch("/api/problems", { method: "DELETE" });
        await loadPreviousProblems();
        chatBox.innerHTML = ""; 
    });

    loadPreviousProblems();
  </script>
</body>
</html>

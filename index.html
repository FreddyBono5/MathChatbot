<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Algebraic Math Tutor</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Previous Problems</h2>
            <ul id="problem-list">
                <!-- Filled dynamically -->
            </ul>

            <button id="clear-history">Clear History</button>
        </aside>

        <!-- Main Content -->
        <main class="chat-container">
            <header class="chat-header">
                <h1>Algebraic Math Tutor</h1>
                <p>Ask a math question or enter an equation</p>
            </header>

            <div class="chat-box" id="chat-box">
                <!-- Messages dynamically added here -->
            </div>

            <form id="chat-form" class="chat-input">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Example: Solve x² + 6x + 5 = 0"
                    required
                />
                <button type="submit">Send</button>
            </form>
        </main>

    </div>

    <script>
        const chatForm = document.getElementById("chat-form");
        const userInput = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const message = userInput.value.trim();
            if (!message) return;

            addMessage("user", message);
            userInput.value = "";

            try {
                const response = await fetch("/api/solve", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ problem: message })
                });

                const data = await response.json();
                addMessage("bot", data.solution || "Error solving problem.");
            } catch (err) {
                addMessage("bot", "Something went wrong. Please try again.");
            }
        });

        function addMessage(sender, text) {
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message", sender);
            messageDiv.innerText = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
